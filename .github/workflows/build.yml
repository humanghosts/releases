name: Build Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号 (如 v0.0.1)'
        required: true
        default: 'v0.0.1'

permissions:
  contents: write

env:
  PROJECT_ID: ai-col-lab
  PROJECT_NAME: AI Col Lab
  FLUTTER_DIR: tools/gui

jobs:
  build-and-release:
    runs-on: windows-2022
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: humanghosts/collaboration
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build Windows
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build windows --release

      - name: Bundle standard skills
        shell: pwsh
        run: |
          Copy-Item -Path tools/gui/standard -Destination tools/gui/build/windows/x64/runner/Release/data/flutter_assets/standard -Recurse -Force

      - name: Package artifacts
        shell: pwsh
        run: |
          $dir = "tools\gui\build\windows\x64\runner\Release"
          tar -czf ai-col-lab-windows-x64.tar.gz -C $dir .

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          name: ${{ env.PROJECT_NAME }} ${{ github.event.inputs.tag }}
          artifacts: ai-col-lab-windows-x64.tar.gz
          artifactErrorsFailBuild: false
          replacesArtifacts: true
          allowUpdates: true

      - name: Update latest.json
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $version = $tag -replace '^v', ''
          $downloadBase = "https://github.com/humanghosts/releases/releases/download/$tag"
          $file = "ai-col-lab-windows-x64.tar.gz"
          $size = (Get-Item $file).Length

          $latest = @{
            projectName = "${{ env.PROJECT_NAME }}"
            version = $version
            tag = $tag
            releasedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            releaseUrl = "https://github.com/humanghosts/releases/releases/tag/$tag"
            artifacts = @{
              windows = @{
                name = $file
                url = "$downloadBase/$file"
                size = $size
              }
            }
          } | ConvertTo-Json -Compress

          Write-Output "=== latest.json ==="
          Write-Output $latest
          Write-Output "===================="

          $latest | Out-File -FilePath latest.json -Encoding utf8NoBOM

          $path = "${{ env.PROJECT_ID }}/latest.json"
          $content = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes((Get-Content latest.json -Raw)))
          $ghToken = "${{ secrets.GITHUB_TOKEN }}"

          # 获取现有文件 SHA
          $headers = @{ Authorization = "token $ghToken" }
          try {
            $existing = Invoke-RestMethod -Uri "https://api.github.com/repos/humanghosts/releases/contents/$path" -Headers $headers
            $sha = $existing.sha
          } catch {
            $sha = $null
          }

          $body = @{
            message = "Update ${{ env.PROJECT_ID }}/latest.json: $version"
            content = $content
          }
          if ($sha) { $body.sha = $sha }
          $jsonBody = $body | ConvertTo-Json

          Invoke-RestMethod -Uri "https://api.github.com/repos/humanghosts/releases/contents/$path" `
            -Method Put -Headers $headers -Body $jsonBody -ContentType "application/json"
